<!DOCTYPE html>
<html>

<head>

<title>SafeHer AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg p-4">

<h1 class="text-center text-danger">
🚨 SafeHer AI
</h1>

<p class="text-center">
Women Safety Assistant
</p>

<hr>

<button
class="btn btn-danger btn-lg"
onclick="sendSOS()">

Emergency SOS

</button>

<hr>

<h3>AI Distress Detection</h3>

<input
class="form-control"
type="text"
id="message"
placeholder="Enter emergency text">

<br>

<button
class="btn btn-primary"
onclick="checkRisk()">

Analyze

</button>

<br><br>

<h4 id="result"></h4>

<hr>

<h3>Your Location</h3>

<button
class="btn btn-success"
onclick="getLocation()">

Get Live Location

</button>

<p id="location"></p>

</div>

</div>

<script src="{{ url_for('static',
filename='js/app.js') }}"></script>

</body>
</html>

<hr>

<button
class="btn btn-warning"
onclick="findNearby()">

Find Nearby Help Centers

</button>

<ul id="places"></ul>
